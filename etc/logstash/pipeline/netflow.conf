# NetFlow 采集管道:agent 的 nprobe 把 NetFlow 送到 <部署机IP>:5044(UDP),
# 这里用自带的 netflow codec 解码后写入 Elasticsearch 的 netflow-* 索引。
# 只做 NetFlow,不收 syslog/beats(按部署决策)。

input {
  udp {
    port  => 5044
    codec => netflow
    # NetFlow 报文可能较大,放宽接收缓冲
    receive_buffer_bytes => 8388608
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "elastic"
    # compose 把 .env 的 ELASTIC_PASSWORD 作为容器环境变量传入,这里引用
    password => "${ELASTIC_PASSWORD}"
    index    => "netflow-%{+YYYY.MM.dd}"
  }
}
