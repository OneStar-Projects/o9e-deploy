# 80 → 443 强跳
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# 443 主站
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # n9e 业务 API + 嵌入式前端
    location / {
        proxy_pass http://n9e:17000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # 长轮询 / SSE:
    #   - /api/n9e/agent/bundle              cfgsync host 侧 config-sync 长轮询
    #   - /api/n9e/event-pipeline/:id/stream 事件管道 SSE
    # 关 buffering,延长 read_timeout,避免被 nginx 截断
    location ~ ^/api/n9e/(agent/bundle|event-pipeline/[^/]+/stream)$ {
        proxy_pass http://n9e:17000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
